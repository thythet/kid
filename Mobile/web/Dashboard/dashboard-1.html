<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>PrayInfo Admin Dashboard</title>
<link href="./vendor/remixicon/remixicon.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
@font-face{font-family:Krasar;src:url('./fonts/Krasar-Regular.woff') format('woff');font-display:swap}
:root{--bg1:#081426;--bg2:#102347;--glass:rgba(255,255,255,.085);--glass2:rgba(255,255,255,.13);--line:rgba(255,255,255,.16);--text:#f8fafc;--muted:#a7b3c6;--blue:#5da7ff;--violet:#7a79ff;--green:#22c55e;--red:#fb7185;--yellow:#facc15}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;font-family:Krasar,system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:var(--text)}
body{background:radial-gradient(circle at 14% 8%,rgba(93,167,255,.25),transparent 33%),radial-gradient(circle at 88% 5%,rgba(122,121,255,.24),transparent 30%),radial-gradient(circle at 50% 98%,rgba(34,197,94,.13),transparent 35%),linear-gradient(160deg,var(--bg1),var(--bg2));padding:max(14px,env(safe-area-inset-top)) max(14px,env(safe-area-inset-right)) max(18px,env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-left))}
.hidden{display:none!important}button,input,select{font:inherit;color:inherit}button{border:0;cursor:pointer}.app{max-width:1180px;margin:0 auto}.glass{background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.055));border:1px solid var(--line);border-radius:28px;box-shadow:0 24px 70px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.16);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px)}
.btn,.input{border:1px solid var(--line);background:var(--glass);border-radius:18px;color:var(--text);box-shadow:inset 0 1px 0 rgba(255,255,255,.12)}.btn{padding:12px 15px;font-weight:950}.btn:active,.student-card:active{transform:scale(.97);filter:brightness(1.08)}.primary{background:linear-gradient(135deg,var(--blue),var(--violet));border-color:rgba(147,197,253,.45)}.danger{background:linear-gradient(135deg,rgba(251,113,133,.28),rgba(127,29,29,.22));border-color:rgba(251,113,133,.38);color:#ffe4e6}.input{width:100%;min-height:50px;padding:13px 15px;outline:0;font-weight:850}.input:focus{border-color:rgba(147,197,253,.62);box-shadow:0 0 0 4px rgba(93,167,255,.12),inset 0 1px 0 rgba(255,255,255,.14)}select.input{appearance:none;background-image:linear-gradient(45deg,transparent 50%,#dbeafe 50%),linear-gradient(135deg,#dbeafe 50%,transparent 50%);background-position:calc(100% - 18px) 22px,calc(100% - 12px) 22px;background-size:6px 6px;background-repeat:no-repeat;padding-right:38px}.row{display:flex;gap:9px;align-items:center}.between{justify-content:space-between}.top{position:sticky;top:max(10px,env(safe-area-inset-top));z-index:20;padding:14px;margin-bottom:14px}.title{font-size:24px;font-weight:1000;letter-spacing:-.03em}.sub{font-size:12px;color:#dbeafe;font-weight:850}.top-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.login-wrap{min-height:calc(100vh - 32px);display:grid;place-items:start center;padding-top:clamp(54px,14vh,150px)}.login-card{width:min(92vw,520px);padding:34px}.brand{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:22px}.logo{width:56px;height:56px;border-radius:18px;display:grid;place-items:center;font-size:30px;background:linear-gradient(135deg,rgba(93,167,255,.36),rgba(122,121,255,.24));border:1px solid rgba(255,255,255,.15)}.key-wrap{position:relative;margin-top:10px}.key-wrap .input{padding-right:58px}.go{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--violet));font-size:22px;display:grid;place-items:center}.status{min-height:22px;margin-top:10px;color:#bfdbfe;font-weight:850}.err{color:#fecaca}.ok{color:#bbf7d0}
.filters{display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr;gap:9px;margin:14px 0}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{position:relative;overflow:hidden;padding:16px;border-radius:24px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12)}.stat span{display:block;color:var(--muted);font-weight:900;font-size:12px}.stat b{display:block;font-size:30px;margin-top:3px}.stat i{position:absolute;right:15px;top:15px;color:#dbeafe;font-size:25px;opacity:.9}.panel{padding:16px;margin:14px 0}.panel h2{margin:0 0 12px;font-size:20px}.chart-grid{display:grid;grid-template-columns:1.25fr .75fr;gap:14px}.chart-wrap{height:280px;padding:12px;border-radius:22px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1)}
.student-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}.student-card{padding:13px;border-radius:24px;background:rgba(255,255,255,.065);border:1px solid rgba(255,255,255,.11);transition:.16s transform,.16s filter}.stu-head{display:grid;grid-template-columns:56px 1fr auto;gap:10px;align-items:center}.avatar{width:56px;height:56px;border-radius:18px;display:grid;place-items:center;overflow:hidden;background:linear-gradient(135deg,rgba(93,167,255,.22),rgba(122,121,255,.14));border:1px solid rgba(147,197,253,.28);font-size:26px}.avatar img{width:100%;height:100%;object-fit:cover}.stu-name{font-size:17px;font-weight:1000;line-height:1.1}.stu-meta{font-size:12px;color:var(--muted);font-weight:850;margin-top:3px}.rate{width:58px;height:58px;border-radius:20px;display:grid;place-items:center;background:rgba(93,167,255,.12);border:1px solid rgba(147,197,253,.26);font-weight:1000}.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px}.mini-stat{padding:8px;border-radius:15px;background:rgba(147,197,253,.11);text-align:center}.mini-stat span{display:block;color:var(--muted);font-size:10px;font-weight:900}.mini-stat b{font-size:16px}.meter{height:7px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:10px}.meter i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--blue))}.card-foot{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:10px}.badge{padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.08);color:#dbeafe;font-size:11px;font-weight:950}
.modal{position:fixed;inset:0;z-index:60;background:rgba(2,6,23,.68);display:grid;place-items:center;padding:18px;backdrop-filter:blur(11px);-webkit-backdrop-filter:blur(11px)}.modal-card{width:min(94vw,850px);max-height:88vh;overflow:auto;padding:18px}.modal-head{display:grid;grid-template-columns:72px 1fr auto;gap:12px;align-items:center}.modal-head h2{margin:0}.modal-head p{margin:5px 0 0;color:var(--muted);font-weight:850}.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:14px 0}.detail-stat{padding:12px;border-radius:18px;background:rgba(255,255,255,.065);border:1px solid rgba(255,255,255,.1)}.detail-stat span{display:block;color:var(--muted);font-size:12px;font-weight:900}.detail-stat b{font-size:24px}.range-box{display:grid;grid-template-columns:1fr 1fr auto;gap:9px;margin-bottom:12px}.heatmap{display:grid;grid-template-columns:repeat(auto-fill,minmax(24px,1fr));gap:6px}.day{height:24px;border-radius:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.09);display:grid;place-items:center;font-size:12px;font-weight:1000}.day.yes{background:linear-gradient(135deg,#22c55e,#70dc9b);color:#fff}.day.no{background:linear-gradient(135deg,rgba(251,113,133,.24),rgba(127,29,29,.18));color:#fecaca}.empty{padding:26px;text-align:center;color:var(--muted);font-weight:850;border:1px dashed rgba(255,255,255,.2);border-radius:20px}
@media(max-width:780px){.filters,.chart-grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.detail-grid{grid-template-columns:repeat(2,1fr)}.range-box{grid-template-columns:1fr 1fr}.range-box .btn{grid-column:1/-1}.title{font-size:21px}.top .row{align-items:flex-start}.top-actions .btn{padding:10px 12px}}@media(max-width:420px){.stats{grid-template-columns:1fr}.student-grid{grid-template-columns:1fr}.mini-stats{grid-template-columns:1fr 1fr 1fr}.detail-grid{grid-template-columns:1fr 1fr}.login-card{padding:26px}.modal-head{grid-template-columns:60px 1fr auto}.avatar{width:52px;height:52px}}
</style>
</head>
<body>
<div id="loginView" class="login-wrap">
  <div class="login-card glass">
    <div class="brand"><div class="logo"><i class="ri-dashboard-3-line"></i></div><h1>Admin Dashboard</h1></div>
    <input id="email" class="input" placeholder="Email">
    <div class="key-wrap"><input id="password" class="input" type="password" placeholder="Key"><button id="loginBtn" class="go"><i class="ri-arrow-right-line"></i></button></div>
    <div id="loginStatus" class="status"></div>
  </div>
</div>
<div id="appView" class="app hidden">
  <div class="top glass">
    <div class="row between"><div><div class="title">PrayInfo Admin Dashboard</div><div id="userText" class="sub">Admin analytics only</div></div><div class="top-actions"><a class="btn" href="./index.html" style="text-decoration:none"><i class="ri-arrow-left-line"></i> Main App</a><button id="refreshBtn" class="btn primary"><i class="ri-refresh-line"></i> Refresh</button><button id="logoutBtn" class="btn danger"><i class="ri-logout-box-line"></i> Logout</button></div></div>
  </div>
  <div class="filters">
    <input id="search" class="input" placeholder="Search student, class, church">
    <select id="churchFilter" class="input"><option value="">All churches</option></select>
    <select id="classFilter" class="input"><option value="">All classes</option></select>
    <select id="sortBy" class="input"><option value="rateDesc">Highest rate</option><option value="rateAsc">Lowest rate</option><option value="nameAsc">Name A-Z</option><option value="monthDesc">This month</option><option value="yearDesc">This year</option></select>
  </div>
  <div class="stats">
    <div class="stat"><i class="ri-group-line"></i><span>Total Students</span><b id="totalStudents">0</b></div>
    <div class="stat"><i class="ri-calendar-check-line"></i><span>This Week</span><b id="weekRate">0%</b></div>
    <div class="stat"><i class="ri-bar-chart-2-line"></i><span>This Month</span><b id="monthRate">0%</b></div>
    <div class="stat"><i class="ri-trophy-line"></i><span>Best Student</span><b id="bestStudent" style="font-size:20px">-</b></div>
  </div>
  <div class="chart-grid">
    <div class="panel glass"><h2>Monthly Attendance Trend</h2><div class="chart-wrap"><canvas id="monthChart"></canvas></div></div>
    <div class="panel glass"><h2>Class Comparison</h2><div class="chart-wrap"><canvas id="classChart"></canvas></div></div>
  </div>
  <div class="panel glass">
    <div class="row between" style="margin-bottom:12px"><h2 style="margin:0">Student Analytics</h2><div class="sub" id="resultCount">0 students</div></div>
    <div id="studentGrid" class="student-grid"></div>
  </div>
</div>
<div id="modal" class="modal hidden"></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getDatabase, ref, get } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const firebaseConfig={apiKey:'AIzaSyD4SGK5Gvo1xtrljap1zay1bwDxlrlGmoY',authDomain:'sunday-school-system-7f1f8.firebaseapp.com',databaseURL:'https://sunday-school-system-7f1f8-default-rtdb.asia-southeast1.firebasedatabase.app',projectId:'sunday-school-system-7f1f8',storageBucket:'sunday-school-system-7f1f8.firebasestorage.app',messagingSenderId:'855692058999',appId:'1:855692058999:web:b3c41eae77488670b50172'};
const ADMIN_UID='C7d7qJv1wZYCHb8ELgixR01Hh4E3';
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getDatabase(app),$=id=>document.getElementById(id);
const state={churches:{},classes:{},students:{},attendance:{},stats:[],monthChart:null,classChart:null,loadedKeys:new Set()};

const pad=n=>String(n).padStart(2,'0'),dateKey=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`,today=()=>dateKey(new Date()),monthNow=()=>today().slice(0,7),yearNow=()=>today().slice(0,4);
const clean=v=>String(v||'').trim(),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function showStatus(msg,ok=true){$('loginStatus').textContent=msg;$('loginStatus').className='status '+(ok?'ok':'err')}
function setBusy(msg){$('refreshBtn').innerHTML=msg}

$('password').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
$('loginBtn').onclick=login;$('logoutBtn').onclick=()=>signOut(auth);$('refreshBtn').onclick=loadData;
async function login(){try{await signInWithEmailAndPassword(auth,clean($('email').value),$('password').value);showStatus('Loading...',true)}catch(e){showStatus(e.code||e.message,false)}}
onAuthStateChanged(auth,async user=>{if(!user){$('loginView').classList.remove('hidden');$('appView').classList.add('hidden');return}if(user.uid!==ADMIN_UID){await signOut(auth);showStatus('Admin only dashboard. This account is not allowed.',false);return}$('loginView').classList.add('hidden');$('appView').classList.remove('hidden');$('userText').textContent=user.email+' • admin';await loadData()});

async function read(path){const s=await get(ref(db,path));return s.val()||{}}
async function loadData(){
  try{
    setBusy('Loading data...');
    const [churches,classes,students]=await Promise.all([read('churches'),read('classes'),read('students')]);
    Object.assign(state,{churches,classes,students,attendance:{},loadedKeys:new Set()});
    buildFilters();
    setBusy('Loading attendance...');
    await loadAttendanceLeaves(allStudents(), dashboardDates());
    computeAndRender();
  }catch(e){
    alert((e.code||e.message)+'\n\nThis version does NOT read attendance root. It only reads allowed leaf paths: attendance/date/classId/studentId.');
  }finally{$('refreshBtn').innerHTML='<i class="ri-refresh-line"></i> Refresh'}
}

function isPresent(v){return v==='present'||v===true||v?.present===true||v?.status==='present'||v?.value==='present'}
function getClass(id){return state.classes[id]?.name||'No class'}function getChurch(id){return state.churches[id]?.name||'No church'}
function allStudents(){return Object.entries(state.students).map(([id,s])=>({id,...s})).filter(s=>s.active!==false)}
function allClasses(){return Object.entries(state.classes).map(([id,c])=>({id,...c}))}function allChurches(){return Object.entries(state.churches).map(([id,c])=>({id,...c}))}
function startOfWeek(){const d=new Date();d.setDate(d.getDate()-d.getDay());return dateKey(d)}
function monthAdd(month,delta){const [y,m]=month.split('-').map(Number),d=new Date(y,m-1+delta,1);return dateKey(d).slice(0,7)}
function sundaysBetween(fromMonth,toMonth){const [fy,fm]=fromMonth.split('-').map(Number),[ty,tm]=toMonth.split('-').map(Number),d=new Date(fy,fm-1,1),end=new Date(ty,tm,0),arr=[];while(d<=end){if(d.getDay()===0)arr.push(dateKey(d));d.setDate(d.getDate()+1)}return arr}
function monthLabels(n=8){const a=[];let m=monthAdd(monthNow(),-(n-1));for(let i=0;i<n;i++){a.push(m);m=monthAdd(m,1)}return a}
function dashboardDates(){
  const set=new Set([startOfWeek(),...sundaysBetween(monthNow(),monthNow()),...sundaysBetween(yearNow()+'-01',yearNow()+'-12')]);
  monthLabels(8).forEach(m=>sundaysBetween(m,m).forEach(d=>set.add(d)));
  return [...set].sort();
}
function datesFor(type){if(type==='week')return [startOfWeek()];if(type==='month')return sundaysBetween(monthNow(),monthNow());if(type==='year')return sundaysBetween(yearNow()+'-01',yearNow()+'-12');return dashboardDates()}
function saveAttendance(date,classId,studentId,val){state.attendance[date]??={};state.attendance[date][classId]??={};if(val==null) delete state.attendance[date][classId][studentId]; else state.attendance[date][classId][studentId]=val}
async function pool(tasks,limit=35){let i=0;const workers=Array.from({length:Math.min(limit,tasks.length)},async()=>{while(i<tasks.length){const task=tasks[i++];await task()}});await Promise.all(workers)}
async function loadAttendanceLeaves(students,dates){
  const tasks=[];
  for(const s of students){
    if(!s.classId) continue;
    for(const date of dates){
      const key=`${date}/${s.classId}/${s.id}`;
      if(state.loadedKeys.has(key)) continue;
      state.loadedKeys.add(key);
      tasks.push(async()=>{try{const snap=await get(ref(db,'attendance/'+key));saveAttendance(date,s.classId,s.id,snap.val())}catch(e){console.warn('Attendance read blocked or failed:',key,e.code||e.message)}});
    }
  }
  await pool(tasks,35);
}
function countStudent(s,dates){let total=0,present=0;for(const date of dates){if(!date)continue;total++;const rec=state.attendance?.[date]?.[s.classId]?.[s.id];if(isPresent(rec))present++}return {total,present,absent:Math.max(total-present,0),rate:total?Math.round(present/total*100):0}}

function buildFilters(){const oldCh=$('churchFilter').value,oldCl=$('classFilter').value;$('churchFilter').innerHTML='<option value="">All churches</option>'+allChurches().map(c=>`<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('');$('classFilter').innerHTML='<option value="">All classes</option>'+allClasses().map(c=>`<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('');$('churchFilter').value=oldCh;$('classFilter').value=oldCl}
['search','churchFilter','classFilter','sortBy'].forEach(id=>$(id).addEventListener('input',computeAndRender));
function makeStats(){const week=datesFor('week'),month=datesFor('month'),year=datesFor('year'),all=datesFor('all');return allStudents().map(s=>{const w=countStudent(s,week),m=countStudent(s,month),y=countStudent(s,year),l=countStudent(s,all);return {...s,week:w,month:m,year:y,life:l,rate:y.rate||l.rate}})}
function filteredStats(){const q=$('search').value.toLowerCase(),ch=$('churchFilter').value,cl=$('classFilter').value;let arr=state.stats.filter(s=>(!ch||s.churchId===ch)&&(!cl||s.classId===cl)&&(!q||[s.name,getClass(s.classId),getChurch(s.churchId),s.gender,s.age].join(' ').toLowerCase().includes(q)));const sort=$('sortBy').value;arr.sort((a,b)=>sort==='rateAsc'?a.rate-b.rate:sort==='nameAsc'?String(a.name).localeCompare(String(b.name)):sort==='monthDesc'?b.month.present-a.month.present:sort==='yearDesc'?b.year.present-a.year.present:b.rate-a.rate);return arr}
function combine(arr,key){const t=arr.reduce((sum,s)=>sum+s[key].total,0),p=arr.reduce((sum,s)=>sum+s[key].present,0);return {t,p,rate:t?Math.round(p/t*100):0}}
function computeAndRender(){state.stats=makeStats();const arr=filteredStats(),w=combine(arr,'week'),m=combine(arr,'month');$('totalStudents').textContent=arr.length;$('weekRate').textContent=w.rate+'%';$('monthRate').textContent=m.rate+'%';$('bestStudent').textContent=(arr.slice().sort((a,b)=>b.year.rate-a.year.rate)[0]?.name||'-').slice(0,20);$('resultCount').textContent=arr.length+' students';renderStudents(arr);renderCharts(arr)}
function photoSources(s){let f=clean(s.photoFile||s.photo||s.image);if(!f)return [];if(/^(https?:)?\/\//i.test(f)||/^(data|blob):/i.test(f))return [f];f=f.replace(/^\.?\//,'').replace(/^\/+/, '');const base=f.startsWith('assets/img/')?'./'+f:f.startsWith('img/')?'./assets/'+f:'./assets/img/'+encodeURIComponent(f.split(/[\\/]/).pop());return /\.[a-z0-9]{2,5}$/i.test(base)?[base]:['jpg','jpeg','png','webp'].map(x=>`${base}.${x}`)}
function avatar(s){const src=photoSources(s)[0];return src?`<img src="${esc(src)}" onerror="this.remove()">`:'<i class="ri-user-smile-line"></i>'}
function renderStudents(arr){$('studentGrid').innerHTML=arr.map(s=>`<div class="student-card"><div class="stu-head"><div class="avatar">${avatar(s)}</div><div><div class="stu-name">${esc(s.name||'No name')}</div><div class="stu-meta">${esc(getClass(s.classId))} • ${esc(getChurch(s.churchId))}</div></div><div class="rate">${s.rate}%</div></div><div class="mini-stats"><div class="mini-stat"><span>Week</span><b>${s.week.present}/${s.week.total}</b></div><div class="mini-stat"><span>Month</span><b>${s.month.present}/${s.month.total}</b></div><div class="mini-stat"><span>Year</span><b>${s.year.present}/${s.year.total}</b></div></div><div class="meter"><i style="width:${s.rate}%"></i></div><div class="card-foot"><span class="badge">Loaded range ${s.life.present}/${s.life.total}</span><button class="btn primary" data-id="${esc(s.id)}">Details</button></div></div>`).join('')||'<div class="empty">No students found</div>';document.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>openModal(b.dataset.id))}
function renderCharts(arr){const labels=monthLabels(8),data=labels.map(m=>{const ds=sundaysBetween(m,m);let t=0,p=0;arr.forEach(s=>{const c=countStudent(s,ds);t+=c.total;p+=c.present});return t?Math.round(p/t*100):0});if(state.monthChart)state.monthChart.destroy();state.monthChart=new Chart($('monthChart'),{type:'line',data:{labels,datasets:[{label:'Attendance %',data,tension:.38,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#dbeafe'}}},scales:{x:{ticks:{color:'#a7b3c6'},grid:{color:'rgba(255,255,255,.08)'}},y:{min:0,max:100,ticks:{color:'#a7b3c6'},grid:{color:'rgba(255,255,255,.08)'}}}}});const groups={};arr.forEach(s=>{groups[getClass(s.classId)]??={t:0,p:0};groups[getClass(s.classId)].t+=s.month.total;groups[getClass(s.classId)].p+=s.month.present});const cls=Object.entries(groups).map(([k,v])=>[k,v.t?Math.round(v.p/v.t*100):0]).slice(0,8);if(state.classChart)state.classChart.destroy();state.classChart=new Chart($('classChart'),{type:'bar',data:{labels:cls.map(x=>x[0]),datasets:[{label:'This month %',data:cls.map(x=>x[1])}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#dbeafe'}}},scales:{x:{ticks:{color:'#a7b3c6'},grid:{color:'rgba(255,255,255,.08)'}},y:{min:0,max:100,ticks:{color:'#a7b3c6'},grid:{color:'rgba(255,255,255,.08)'}}}}})}
function openModal(id){const s=state.stats.find(x=>x.id===id);if(!s)return;const from=yearNow()+'-01',to=monthNow();$('modal').classList.remove('hidden');$('modal').innerHTML=`<div class="modal-card glass"><div class="modal-head"><div class="avatar">${avatar(s)}</div><div><h2>${esc(s.name||'No name')}</h2><p>${esc(getClass(s.classId))} • ${esc(getChurch(s.churchId))}</p></div><button class="btn danger" id="closeModal"><i class="ri-close-line"></i></button></div><div class="detail-grid"><div class="detail-stat"><span>This Week</span><b>${s.week.present}/${s.week.total}</b></div><div class="detail-stat"><span>This Month</span><b>${s.month.present}/${s.month.total}</b></div><div class="detail-stat"><span>This Year</span><b>${s.year.present}/${s.year.total}</b></div><div class="detail-stat"><span>Year Rate</span><b>${s.year.rate}%</b></div></div><h2>Custom Range Count</h2><div class="range-box"><input id="fromMonth" class="input" type="month" value="${from}"><input id="toMonth" class="input" type="month" value="${to}"><button id="calcRange" class="btn primary">Calculate</button></div><div id="rangeResult" class="detail-grid"></div><h2>Sunday Heatmap</h2><div id="heatmap" class="heatmap"></div></div>`;$('closeModal').onclick=closeModal;$('calcRange').onclick=()=>renderRange(s);renderRange(s)}
async function renderRange(s){const from=$('fromMonth').value||yearNow()+'-01',to=$('toMonth').value||monthNow(),days=sundaysBetween(from,to);$('calcRange').textContent='Loading...';await loadAttendanceLeaves([s],days);$('calcRange').textContent='Calculate';const c=countStudent(s,days);$('rangeResult').innerHTML=`<div class="detail-stat"><span>Total Sundays</span><b>${c.total}</b></div><div class="detail-stat"><span>Present</span><b>${c.present}</b></div><div class="detail-stat"><span>Absent</span><b>${c.absent}</b></div><div class="detail-stat"><span>Rate</span><b>${c.rate}%</b></div>`;$('heatmap').innerHTML=days.map(d=>{const yes=isPresent(state.attendance?.[d]?.[s.classId]?.[s.id]);return `<div class="day ${yes?'yes':'no'}" title="${d}">${yes?'✓':'×'}</div>`}).join('')||'<div class="empty">No Sundays in range</div>'}
function closeModal(){$('modal').classList.add('hidden');$('modal').innerHTML=''}$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
</script>
</body>
</html>
