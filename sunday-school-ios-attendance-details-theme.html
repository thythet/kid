<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Sunday School System</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
<style>
:root{
  --bg1:#081426;--bg2:#102347;--glass:rgba(255,255,255,.085);--glass2:rgba(255,255,255,.13);
  --line:rgba(255,255,255,.16);--text:#f8fafc;--muted:#a7b3c6;--blue:#5da7ff;--violet:#7a79ff;
  --green:#22c55e;--red:#fb7185;--yellow:#facc15;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:var(--text)}
body{
  background:
    radial-gradient(circle at 18% 10%,rgba(93,167,255,.24),transparent 34%),
    radial-gradient(circle at 86% 8%,rgba(122,121,255,.22),transparent 30%),
    radial-gradient(circle at 50% 90%,rgba(34,197,94,.12),transparent 32%),
    linear-gradient(160deg,var(--bg1),var(--bg2));
  padding:16px;
}
.hidden{display:none!important}
button,input,select{font:inherit}
button{border:none;cursor:pointer;color:inherit}
input,select{outline:none;color:var(--text)}
.app{max-width:980px;margin:0 auto}
.glass{
  background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.055));
  border:1px solid var(--line);border-radius:28px;
  box-shadow:0 24px 70px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.16);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
}
.btn,.nav-btn,.input{
  border:1px solid var(--line);background:var(--glass);border-radius:18px;color:var(--text);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
}
.btn{padding:12px 15px;font-weight:900;transition:.16s transform,.16s filter}
.btn:active,.nav-btn:active,.card:active{transform:scale(.965);filter:brightness(1.08)}
.primary{background:linear-gradient(135deg,var(--blue),var(--violet));border-color:rgba(147,197,253,.4)}
.danger{background:linear-gradient(135deg,rgba(251,113,133,.24),rgba(127,29,29,.22));border-color:rgba(251,113,133,.36);color:#fecaca}
.input{width:100%;padding:14px 15px;min-height:50px;background:rgba(255,255,255,.09);font-weight:750}
.input::placeholder{color:#9aa8bb}
select.input{appearance:none;background-image:linear-gradient(45deg,transparent 50%,#dbeafe 50%),linear-gradient(135deg,#dbeafe 50%,transparent 50%);background-position:calc(100% - 18px) 22px,calc(100% - 12px) 22px;background-size:6px 6px;background-repeat:no-repeat;padding-right:38px}
.row{display:flex;gap:9px;align-items:center}.between{justify-content:space-between}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.panel{padding:16px;margin:14px 0}.panel h2,.panel h3{margin:0 0 12px}
.status{min-height:20px;margin-top:8px;color:#bfdbfe;font-weight:850}.err{color:#fecaca}.ok{color:#bbf7d0}

/* Login */
.login-wrap{min-height:100vh;display:grid;place-items:center}
.login-card{width:min(92vw,520px);padding:34px}
.brand{display:flex;align-items:center;gap:16px;margin-bottom:22px}
.logo{width:68px;height:68px;border-radius:23px;display:grid;place-items:center;font-size:36px;background:linear-gradient(135deg,rgba(93,167,255,.36),rgba(122,121,255,.24));border:1px solid rgba(255,255,255,.15)}
.brand h1{margin:0;font-size:42px;letter-spacing:-.04em;line-height:1}
.key-wrap{position:relative}.key-wrap .input{padding-right:104px}
.eye,.go{position:absolute;top:50%;transform:translateY(-50%);display:grid;place-items:center}
.eye{right:56px;width:40px;height:40px;border-radius:14px;background:rgba(255,255,255,.09);font-size:20px}
.go{right:6px;width:44px;height:44px;border-radius:15px;background:linear-gradient(135deg,var(--blue),var(--violet));font-size:24px}
.remember{display:flex;align-items:center;gap:9px;margin-top:12px;width:max-content;cursor:pointer;user-select:none}
.circle{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-radius:50%}
.remember.active .circle{background:linear-gradient(135deg,var(--blue),var(--violet));box-shadow:0 0 0 4px rgba(93,167,255,.12)}
.remember span{font-weight:800;color:#dbeafe}

/* Top */
.top{position:sticky;top:10px;z-index:20;padding:14px;margin-bottom:12px}
.title{font-size:24px;font-weight:1000;letter-spacing:-.03em}
.user{font-size:12px;color:#dbeafe;font-weight:900}
.nav{display:flex;gap:8px;overflow:auto;padding-top:12px;scrollbar-width:none}.nav::-webkit-scrollbar{display:none}
.nav-btn{min-width:76px;padding:10px 8px;font-size:12px;font-weight:950;text-align:center;color:#dbeafe}
.nav-btn i{display:block;font-size:25px}.nav-btn.active{background:linear-gradient(135deg,rgba(93,167,255,.44),rgba(122,121,255,.32));border-color:rgba(147,197,253,.42)}
.page{display:none}.page.active{display:block}

/* Cards */
.list{display:flex;flex-direction:column;gap:9px}
.card{display:grid;grid-template-columns:1fr auto;gap:9px;align-items:center;padding:12px;border-radius:20px;background:rgba(255,255,255,.065);border:1px solid rgba(255,255,255,.11);transition:.16s transform}
.card b{display:block;font-size:17px}.card small{color:var(--muted);font-weight:750}
.actions{display:flex;gap:6px}.actions .btn{padding:8px 10px;border-radius:14px}
.empty{padding:26px;text-align:center;color:var(--muted);font-weight:850;border:1px dashed rgba(255,255,255,.2);border-radius:20px}

/* Attendance */
.weekbar{display:flex;gap:7px;overflow:auto;padding:4px 0 10px;scrollbar-width:none}.weekbar::-webkit-scrollbar{display:none}
.week-chip{flex:0 0 auto;border:1px solid rgba(147,197,253,.25);background:rgba(255,255,255,.065);border-radius:999px;padding:8px 11px;font-weight:950;color:#dbeafe}
.week-chip.active{background:linear-gradient(135deg,rgba(93,167,255,.32),rgba(122,121,255,.22));border-color:rgba(147,197,253,.45)}
.att-card{grid-template-columns:38px 1fr 52px}
.num{width:32px;height:32px;border-radius:12px;display:grid;place-items:center;background:rgba(147,197,253,.12);font-weight:950;color:#dbeafe}
.check{width:46px;height:46px;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);display:grid;place-items:center;font-size:25px}
.check.on{background:linear-gradient(135deg,#22c55e,#70dc9b);color:white;border-color:rgba(112,220,155,.6)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.stat{padding:12px;border-radius:19px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11)}
.stat span{display:block;color:var(--muted);font-weight:900;font-size:12px}.stat b{display:block;font-size:28px;margin-top:2px}

/* ===== STUDENT DETAILS + THEME START ===== */
body.compact .panel{padding:11px!important;margin:9px 0!important;border-radius:22px!important}
body.compact .card{padding:9px!important;border-radius:16px!important}
body.compact .input{min-height:44px!important;padding:10px 13px!important;border-radius:15px!important}
body.compact .btn{padding:9px 12px!important;border-radius:14px!important}
body.compact .nav-btn{min-width:64px!important;padding:8px 7px!important}
body.compact .nav-btn i{font-size:21px!important}
body.compact .top{padding:11px!important}
body.compact .title{font-size:21px!important}
.student-actions{display:flex;align-items:center;justify-content:flex-end;gap:7px;flex-wrap:wrap}
.details-btn{background:linear-gradient(135deg,rgba(93,167,255,.34),rgba(122,121,255,.24))!important;border-color:rgba(147,197,253,.42)!important;color:#dbeafe!important}
.edit-btn{background:linear-gradient(135deg,rgba(255,255,255,.13),rgba(255,255,255,.07))!important}
.modal{position:fixed;inset:0;z-index:99;background:rgba(2,6,23,.62);display:grid;place-items:center;padding:18px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.modal-card{width:min(92vw,620px);max-height:86vh;overflow:auto;padding:18px}
.modal-card h2{margin:0;font-size:26px}.modal-meta{margin:5px 0 0;color:var(--muted);font-weight:800}
.detail-total{min-width:86px;border:1px solid rgba(147,197,253,.28);background:rgba(93,167,255,.13);border-radius:18px;padding:8px 12px;text-align:center}
.detail-total span{display:block;color:#bfdbfe;font-size:11px;font-weight:900}.detail-total b{font-size:25px;color:white}
.detail-weeks{display:flex;flex-direction:column;gap:9px}
.detail-week{display:grid;grid-template-columns:48px 1fr 54px;align-items:center;gap:10px;padding:10px;border-radius:18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11)}
.week-num{width:40px;height:40px;border-radius:14px;display:grid;place-items:center;background:rgba(147,197,253,.12);color:#dbeafe;font-weight:950}
.week-date b{display:block;color:#fff}.week-date small{color:var(--muted);font-weight:750}
.week-check{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);font-size:24px}
.week-check.yes{background:linear-gradient(135deg,#22c55e,#70dc9b);border-color:rgba(112,220,155,.55);color:#fff;box-shadow:0 12px 30px rgba(34,197,94,.18)}
.week-check.no{background:linear-gradient(135deg,rgba(251,113,133,.20),rgba(127,29,29,.16));color:#fecaca}
@media(max-width:640px){.student-actions{justify-content:flex-start}.detail-week{grid-template-columns:42px 1fr 48px}}
/* ===== STUDENT DETAILS + THEME END ===== */

@media(max-width:640px){body{padding:12px}.login-card{padding:28px}.brand h1{font-size:36px}.grid2,.grid3,.stats{grid-template-columns:1fr}.card{grid-template-columns:1fr}.actions{justify-content:flex-end}.att-card{grid-template-columns:36px 1fr 48px}.nav-btn{min-width:70px}}
</style>
</head>
<body>

<div id="loginView" class="login-wrap">
  <div class="login-card glass">
    <div class="brand"><div class="logo"><i class="ri-school-line"></i></div><h1>គ្រូកុមារ</h1></div>
    <input id="email" class="input" placeholder="Email">
    <div class="key-wrap" style="margin-top:10px">
      <input id="password" class="input" type="password" placeholder="Key">
      <button id="togglePass" class="eye"><i class="ri-eye-line"></i></button>
      <button id="loginBtn" class="go"><i class="ri-arrow-right-line"></i></button>
    </div>
    <div id="remember" class="remember active"><div class="circle"></div><span>Remember Login</span></div>
    <div id="loginStatus" class="status"></div>
  </div>
</div>

<div id="appView" class="app hidden">
  <div class="top glass">
    <div class="row between"><div class="title">Sunday School</div><div id="userText" class="user">...</div></div>
    <div class="nav">
      <button class="nav-btn active" data-page="home"><i class="ri-home-5-line"></i>Home</button>
      <button class="nav-btn" data-page="church"><i class="ri-building-4-line"></i>Church</button>
      <button class="nav-btn" data-page="roles"><i class="ri-shield-user-line"></i>Roles</button>
      <button class="nav-btn" data-page="classes"><i class="ri-folder-line"></i>Class</button>
      <button class="nav-btn" data-page="students"><i class="ri-group-line"></i>Student</button>
      <button class="nav-btn" data-page="attendance"><i class="ri-checkbox-circle-line"></i>Attend</button>
      <button class="nav-btn" id="themeBtn"><i class="ri-layout-masonry-line"></i>Compact</button>
      <button class="nav-btn" id="logoutBtn"><i class="ri-logout-box-line"></i>Logout</button>
    </div>
  </div>

  <section id="page-home" class="page active">
    <div class="panel glass">
      <h2>Overview</h2>
      <div class="stats">
        <div class="stat"><span>Churches</span><b id="statChurch">0</b></div>
        <div class="stat"><span>Students</span><b id="statStudent">0</b></div>
        <div class="stat"><span>Present</span><b id="statPresent">0</b></div>
      </div>
    </div>
  </section>

  <section id="page-church" class="page">
    <div class="panel glass">
      <h2>Church</h2>
      <div class="row"><input id="churchName" class="input" placeholder="Church name"><button id="saveChurch" class="btn primary">Save</button></div>
      <div id="churchStatus" class="status"></div>
    </div>
    <div id="churchList" class="list"></div>
  </section>

  <section id="page-roles" class="page">
    <div class="panel glass">
      <h2>Assign Role</h2>
      <div class="grid2">
        <input id="roleName" class="input" placeholder="Name">
        <input id="roleEmail" class="input" placeholder="Email">
        <input id="roleUid" class="input" placeholder="Firebase UID">
        <select id="roleType" class="input"><option value="pastor">Pastor</option><option value="teacher">Teacher</option></select>
        <select id="roleChurch" class="input"></select>
      </div>
      <button id="saveRole" class="btn primary" style="margin-top:10px;width:100%">Save Role</button>
      <div id="roleStatus" class="status"></div>
    </div>
    <div id="roleList" class="list"></div>
  </section>

  <section id="page-classes" class="page">
    <div class="panel glass">
      <h2>Class</h2>
      <div class="row"><input id="className" class="input" placeholder="Class name"><select id="classChurch" class="input"></select><button id="saveClass" class="btn primary">Save</button></div>
      <div id="classStatus" class="status"></div>
    </div>
    <div id="classList" class="list"></div>
  </section>

  <section id="page-students" class="page">
    <div class="panel glass">
      <h2>Student</h2>
      <div class="grid2">
        <input id="studentName" class="input" placeholder="Student name">
        <select id="studentGender" class="input"><option>Male</option><option>Female</option></select>
        <input id="studentAge" class="input" placeholder="Age" type="number">
        <select id="studentChurch" class="input"></select>
        <select id="studentClass" class="input"></select>
      </div>
      <button id="saveStudent" class="btn primary" style="margin-top:10px;width:100%">Save Student</button>
      <div id="studentStatus" class="status"></div>
    </div>
    <div id="studentList" class="list"></div>
  </section>

  <section id="page-attendance" class="page">
    <div class="panel glass">
      <h2>Attendance</h2>
      <div class="grid2">
        <input id="attMonth" class="input" type="month">
        <select id="attClass" class="input"></select>
      </div>
      <div id="weekbar" class="weekbar"></div>
      <div class="stats">
        <div class="stat"><span>Total</span><b id="attTotal">0</b></div>
        <div class="stat"><span>Present</span><b id="attPresent">0</b></div>
        <div class="stat"><span>Absent</span><b id="attAbsent">0</b></div>
      </div>
    </div>
    <div id="attList" class="list"></div>
  </section>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4SGK5Gvo1xtrljap1zay1bwDxlrlGmoY",
  authDomain: "sunday-school-system-7f1f8.firebaseapp.com",
  databaseURL: "https://sunday-school-system-7f1f8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sunday-school-system-7f1f8",
  storageBucket: "sunday-school-system-7f1f8.firebasestorage.app",
  messagingSenderId: "855692058999",
  appId: "1:855692058999:web:b3c41eae77488670b50172"
};
const ADMIN_UID = "C7d7qJv1wZYCHb8ELgixR01Hh4E3";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const $ = id => document.getElementById(id);
const state = { user:null, profile:null, role:"guest", churchId:null, churches:{}, users:{}, classes:{}, students:{}, attendance:{}, selectedSunday:"" };

const clean = v => (v||"").trim().replace(/\s+/g," ");
const today = () => new Date().toISOString().slice(0,10);
const monthNow = () => today().slice(0,7);
function sundays(month){
  const [y,m]=month.split("-").map(Number), d=new Date(y,m-1,1), arr=[];
  while(d.getMonth()===m-1){ if(d.getDay()===0) arr.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
  return arr;
}
function canAdmin(){return state.role==="admin"} function canPastor(){return state.role==="pastor"} function canTeacher(){return state.role==="teacher"}
function roleChurch(){return canAdmin()?null:state.profile?.churchId}


async function ensureAdminReady(){
  if(!state.user || state.user.uid !== ADMIN_UID) return true;
  try{
    await set(ref(db, "admins/" + ADMIN_UID), true);
    return true;
  }catch(e){
    console.warn("Admin bootstrap failed:", e.code || e.message);
    return false;
  }
}

function showStatus(id,msg,ok=true){ const el=$(id); if(el){el.textContent=msg; el.className="status "+(ok?"ok":"err")} }
async function write(path,data,statusId,msg){
  try{
    await set(ref(db,path),data);
    if(statusId)showStatus(statusId,msg,true);
    return true;
  }catch(e){
    if((e.code || "").includes("PERMISSION_DENIED") && state.user?.uid === ADMIN_UID){
      const okAdmin = await ensureAdminReady();
      if(okAdmin){
        try{
          await set(ref(db,path),data);
          if(statusId)showStatus(statusId,msg,true);
          return true;
        }catch(e2){
          const msg2 = (e2.code || e2.message) + "\\n\\nIf this still shows PERMISSION_DENIED, update Firebase Rules with direct admin UID.";
          if(statusId)showStatus(statusId,e2.code||e2.message,false);
          alert(msg2);
          return false;
        }
      }
    }
    if(statusId)showStatus(statusId,e.code||e.message,false);
    alert(e.code||e.message);
    return false;
  }
}

$("togglePass").onclick=()=>{ $("password").type=$("password").type==="password"?"text":"password"; };
$("remember").onclick=()=>$("remember").classList.toggle("active");
$("password").addEventListener("keydown",e=>{ if(e.key==="Enter") login(); });
$("loginBtn").onclick=login;
async function login(){
  const email=clean($("email").value), pass=$("password").value;
  if(!email||!pass) return showStatus("loginStatus","Enter email and key",false);
  try{
    await setPersistence(auth,$("remember").classList.contains("active")?browserLocalPersistence:browserSessionPersistence);
    await signInWithEmailAndPassword(auth,email,pass);
    showStatus("loginStatus","Loading...",true);
  }catch(e){ showStatus("loginStatus",e.code||e.message,false); }
}
$("logoutBtn").onclick=()=>signOut(auth);

onAuthStateChanged(auth, async user=>{
  if(!user){ $("loginView").classList.remove("hidden"); $("appView").classList.add("hidden"); return; }
  state.user=user;
  if(user.uid===ADMIN_UID){
    state.profile={uid:user.uid,name:"Admin",role:"admin",churchId:"all"}; state.role="admin";
  }else{
    const s=await get(ref(db,"users/"+user.uid)); state.profile=s.val();
    if(!state.profile){ await signOut(auth); return showStatus("loginStatus","No role assigned",false); }
    state.role=state.profile.role; state.churchId=state.profile.churchId;
  }
  await ensureAdminReady();
  $("loginView").classList.add("hidden"); $("appView").classList.remove("hidden");
  $("userText").textContent=(state.profile.name||user.email)+" • "+state.role;
  applyRole(); loadData();
});

function applyRole(){
  document.querySelectorAll(".nav-btn[data-page='church'],.nav-btn[data-page='roles']").forEach(b=>b.classList.toggle("hidden",!canAdmin()));
  document.querySelector(".nav-btn[data-page='classes']").classList.toggle("hidden",!(canAdmin()||canPastor()));
}
document.querySelectorAll(".nav-btn[data-page]").forEach(b=>b.onclick=()=>page(b.dataset.page));
function page(name){ document.querySelectorAll(".page").forEach(p=>p.classList.remove("active")); $("page-"+name).classList.add("active"); document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.page===name)); renderAll(); }

function loadData(){
  onValue(ref(db),snap=>{
    const v=snap.val()||{}; state.churches=v.churches||{}; state.users=v.users||{}; state.classes=v.classes||{}; state.students=v.students||{}; state.attendance=v.attendance||{};
    renderAll();
  });
}
const visibleChurches=()=>Object.entries(state.churches).map(([id,c])=>({id,...c})).filter(c=>canAdmin()||c.id===roleChurch());
const visibleClasses=()=>Object.entries(state.classes).map(([id,c])=>({id,...c})).filter(c=>canAdmin()||c.churchId===roleChurch());
const visibleStudents=()=>Object.entries(state.students).map(([id,s])=>({id,...s})).filter(s=>canAdmin()?true:s.churchId===roleChurch());
const churchName=id=>state.churches[id]?.name||"";
const className=id=>state.classes[id]?.name||"";

$("saveChurch").onclick=async()=>{ const name=clean($("churchName").value); if(!name)return; const id=push(ref(db,"churches")).key; if(await write("churches/"+id,{name,createdAt:Date.now()},"churchStatus","Church saved")) $("churchName").value=""; };
$("saveRole").onclick=async()=>{
  const uid=clean($("roleUid").value), name=clean($("roleName").value), email=clean($("roleEmail").value), role=$("roleType").value, churchId=$("roleChurch").value;
  if(!uid||!name||!churchId)return showStatus("roleStatus","Add UID, name, church. Create church first.",false);
  const data={uid,name,email,role,churchId,active:true,updatedAt:Date.now()};
  if(await write("users/"+uid,data,"roleStatus","Role saved")){ $("roleUid").value=$("roleName").value=$("roleEmail").value=""; }
};
$("saveClass").onclick=async()=>{ const name=clean($("className").value), churchId=canAdmin()?$("classChurch").value:roleChurch(); if(!name||!churchId)return; const id=push(ref(db,"classes")).key; if(await write("classes/"+id,{name,churchId},"classStatus","Class saved")) $("className").value=""; };
$("saveStudent").onclick=async()=>{ 
  const name=clean($("studentName").value), churchId=canAdmin()?$("studentChurch").value:roleChurch(), classId=$("studentClass").value; 
  if(!name||!churchId||!classId)return showStatus("studentStatus","Add name, church, class",false); 
  const id=editingStudentId || push(ref(db,"students")).key; 
  const data={name,gender:$("studentGender").value,age:clean($("studentAge").value),churchId,classId,active:true,updatedAt:Date.now()}; 
  if(await write("students/"+id,data,"studentStatus",editingStudentId?"Student updated":"Student saved")){ 
    editingStudentId="";
    $("studentName").value=$("studentAge").value=""; 
  } 
};
async function del(path,id){ if(confirm("Delete?")) await remove(ref(db,path+"/"+id)); }
window.del=del;
window.editStudent = editStudent;
window.showStudentDetails = showStudentDetails;

function renderSelects(){
  const ch=visibleChurches().map(c=>`<option value="${c.id}">${c.name}</option>`).join("");
  ["roleChurch","classChurch","studentChurch"].forEach(id=>{ if($(id)) $(id).innerHTML=ch; });
  const cl=visibleClasses().map(c=>`<option value="${c.id}">${c.name}</option>`).join("");
  ["studentClass","attClass"].forEach(id=>{ if($(id)) $(id).innerHTML=cl; });
}
function renderAll(){ renderSelects(); renderChurches(); renderRoles(); renderClasses(); renderStudents(); renderAttendance(); renderStats(); }
function renderChurches(){ $("churchList").innerHTML=visibleChurches().map(c=>`<div class="card"><div><b>${c.name}</b><small>${c.id}</small></div><div class="actions"><button class="btn danger" onclick="del('churches','${c.id}')"><i class="ri-delete-bin-line"></i></button></div></div>`).join("")||`<div class="empty">No church</div>`; }
function renderRoles(){ $("roleList").innerHTML=Object.entries(state.users).map(([id,u])=>({id,...u})).filter(u=>canAdmin()&&u.role!=="admin").map(u=>`<div class="card"><div><b>${u.name}</b><small>${u.role} • ${churchName(u.churchId)} • ${u.uid}</small></div><div class="actions"><button class="btn danger" onclick="del('users','${u.id}')"><i class="ri-delete-bin-line"></i></button></div></div>`).join("")||`<div class="empty">No users</div>`; }
function renderClasses(){ $("classList").innerHTML=visibleClasses().map(c=>`<div class="card"><div><b>${c.name}</b><small>${churchName(c.churchId)}</small></div><div class="actions"><button class="btn danger" onclick="del('classes','${c.id}')"><i class="ri-delete-bin-line"></i></button></div></div>`).join("")||`<div class="empty">No class</div>`; }

let editingStudentId = "";
let selectedDetailStudentId = "";

function setTheme(mode){
  document.body.classList.toggle("compact", mode === "compact");
  localStorage.setItem("ss_theme", mode);
  if($("themeBtn")){
    $("themeBtn").innerHTML = mode === "compact"
      ? '<i class="ri-layout-masonry-line"></i>Normal'
      : '<i class="ri-layout-grid-line"></i>Compact';
  }
}
setTheme(localStorage.getItem("ss_theme") || "normal");
if($("themeBtn")){
  $("themeBtn").onclick = () => setTheme(document.body.classList.contains("compact") ? "normal" : "compact");
}

function editStudent(id){
  const s = state.students[id];
  if(!s) return;
  editingStudentId = id;
  $("studentName").value = s.name || "";
  $("studentGender").value = s.gender || "Male";
  $("studentAge").value = s.age || "";
  if($("studentChurch")) $("studentChurch").value = s.churchId || "";
  if($("studentClass")) $("studentClass").value = s.classId || "";
  page("students");
  window.scrollTo({top:0,behavior:"smooth"});
}

function showStudentDetails(id){
  selectedDetailStudentId = id;
  const s = state.students[id];
  if(!s) return;
  $("modalStudentName").textContent = s.name || "Student";
  $("modalStudentMeta").textContent = `${s.gender || "-"} • Age ${s.age || "-"} • ${className(s.classId)}`;
  $("detailMonth").value = $("detailMonth").value || monthNow();
  renderStudentDetails();
  $("studentModal").classList.remove("hidden");
}
function renderStudentDetails(){
  const id = selectedDetailStudentId;
  const s = state.students[id];
  if(!s) return;
  const month = $("detailMonth").value || monthNow();
  const ss = sundays(month);
  let total = 0;
  $("detailWeeks").innerHTML = ss.map((date,i)=>{
    const status = state.attendance[date]?.[s.classId]?.[id] || "absent";
    const yes = status === "present";
    if(yes) total++;
    return `<div class="detail-week">
      <div class="week-num">W${i+1}</div>
      <div class="week-date"><b>${date}</b><small>Sunday attendance</small></div>
      <div class="week-check ${yes ? "yes" : "no"}">${yes ? "✓" : "✕"}</div>
    </div>`;
  }).join("") || `<div class="empty">No Sunday in this month</div>`;
  $("detailTotal").textContent = `${total}/${ss.length}`;
}
if($("closeStudentModal")) $("closeStudentModal").onclick = () => $("studentModal").classList.add("hidden");
if($("detailMonth")) $("detailMonth").onchange = renderStudentDetails;

function renderStudents(){ 
  $("studentList").innerHTML=visibleStudents().map(s=>`<div class="card">
    <div><b>${s.name}</b><small>${s.gender} • Age ${s.age||"-"} • ${className(s.classId)}</small></div>
    <div class="student-actions">
      <button class="btn details-btn" onclick="showStudentDetails('${s.id}')"><i class="ri-file-list-3-line"></i> Details</button>
      <button class="btn edit-btn" onclick="editStudent('${s.id}')"><i class="ri-edit-line"></i> Edit</button>
      <button class="btn danger" onclick="del('students','${s.id}')"><i class="ri-delete-bin-line"></i></button>
    </div>
  </div>`).join("")||`<div class="empty">No student</div>`; 
}
function renderStats(){ $("statChurch").textContent=visibleChurches().length; $("statStudent").textContent=visibleStudents().length; const date=state.selectedSunday||sundays(monthNow())[0]||today(); const rec=state.attendance[date]||{}; let p=0; Object.values(rec).forEach(cls=>Object.values(cls||{}).forEach(v=>{if(v==="present")p++})); $("statPresent").textContent=p; }

$("attMonth").value=monthNow(); $("attMonth").onchange=()=>{state.selectedSunday=""; renderAttendance();}; $("attClass").onchange=renderAttendance;
function renderAttendance(){
  const month=$("attMonth").value||monthNow(), ss=sundays(month); if(!state.selectedSunday) state.selectedSunday=ss[0]||today();
  $("weekbar").innerHTML=ss.map((d,i)=>`<button class="week-chip ${d===state.selectedSunday?"active":""}" data-day="${d}">W${i+1} • ${d.slice(5)}</button>`).join("");
  document.querySelectorAll("[data-day]").forEach(b=>b.onclick=()=>{state.selectedSunday=b.dataset.day;renderAttendance();});
  const classId=$("attClass").value; const students=visibleStudents().filter(s=>!classId||s.classId===classId);
  const rec=state.attendance[state.selectedSunday]?.[classId]||{}; let present=students.filter(s=>rec[s.id]==="present").length;
  $("attTotal").textContent=students.length; $("attPresent").textContent=present; $("attAbsent").textContent=students.length-present;
  $("attList").innerHTML=students.map((s,i)=>`<div class="card att-card"><div class="num">${i+1}</div><div><b>${s.name}</b><small>${className(s.classId)}</small></div><button class="check ${rec[s.id]==='present'?'on':''}" data-stu="${s.id}">${rec[s.id]==='present'?'✓':''}</button></div>`).join("")||`<div class="empty">No students</div>`;
  document.querySelectorAll("[data-stu]").forEach(btn=>btn.onclick=async()=>{ const sid=btn.dataset.stu, path=`attendance/${state.selectedSunday}/${classId}/${sid}`; await set(ref(db,path),rec[sid]==="present"?"absent":"present"); });
}
</script>

<div id="studentModal" class="modal hidden">
  <div class="modal-card glass">
    <div class="row between">
      <div>
        <h2 id="modalStudentName">Student</h2>
        <p id="modalStudentMeta" class="modal-meta"></p>
      </div>
      <button id="closeStudentModal" class="btn danger"><i class="ri-close-line"></i></button>
    </div>
    <div class="row" style="margin:12px 0">
      <input id="detailMonth" class="input" type="month">
      <div class="detail-total"><span>Total</span><b id="detailTotal">0</b></div>
    </div>
    <div id="detailWeeks" class="detail-weeks"></div>
  </div>
</div>

</body>
</html>
